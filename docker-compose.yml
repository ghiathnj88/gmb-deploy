# Deploy-Compose OHNE Build: nutzt fertige Images aus der GitHub Container Registry (GHCR),
# die der Workflow .github/workflows/docker-publish.yml baut+pusht.
# -> im Hostinger Docker Manager einfügen (kein SSH, kein Build am Server).
#
# Nötige Umgebungsvariablen im Docker Manager (Env-Feld) setzen:
#   JWT_SECRET (Pflicht, >=16 Zeichen)  ·  ADMIN_EMAIL  ·  ADMIN_PASSWORD
#   N8N_WEBHOOK_URL  ·  N8N_WEBHOOK_SECRET   (für den Online-Marktpreis)
# Danach ist die App unter http://DEINE-SERVER-IP:8080 erreichbar (nur EIN Port offen: 8080).

services:
  api:
    image: ghcr.io/ghiathnj88/gmb-api:latest
    container_name: gmb-api
    restart: unless-stopped
    # KEIN Host-Port: die API ist nur intern erreichbar; der web-Container proxyt /api dorthin.
    environment:
      - DATABASE_URL=file:/data/prod.db
      - UPLOADS_DIR=/data/uploads
      - PORT=3001
      - NODE_ENV=production
      - JWT_EXPIRES_IN=12h
      # Pass-Through aus den Docker-Manager-Env-Feldern (nur gesetzt, wenn dort eingetragen):
      - JWT_SECRET
      - ADMIN_NAME
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - N8N_WEBHOOK_URL
      - N8N_WEBHOOK_SECRET
    volumes:
      - gmb-data:/data
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    image: ghcr.io/ghiathnj88/gmb-web:latest
    container_name: gmb-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  gmb-data:
